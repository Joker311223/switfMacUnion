<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoApp — 专注写作的 macOS 备忘录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0d0d0f;
        --surface: #18181c;
        --surface2: #222228;
        --border: rgba(255,255,255,0.07);
        --accent: #7c6fff;
        --accent2: #a78bfa;
        --text: #e8e8f0;
        --text2: #9898b0;
        --text3: #5a5a72;
        --green: #4ade80;
        --radius: 16px;
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      /* ────────────────────────────────────────────────
         数据
      ──────────────────────────────────────────────── */
      const features = [
        {
          icon: "✦",
          title: "Markdown 实时预览",
          desc: "编辑区与预览区并排显示，输入即渲染。支持标题、代码块、表格、引用、高亮等全量语法。",
          color: "#7c6fff",
        },
        {
          icon: "⌘",
          title: "全局快捷键唤醒",
          desc: "在任何应用中按下 ⌃⌥Z，瞬间唤出最近备忘录，开始记录，毫不打断当前工作流。",
          color: "#06b6d4",
        },
        {
          icon: "⌘K",
          title: "快捷插入超链接",
          desc: "选中文字后按 ⌘K，弹出轻量输入面板，一键插入 Markdown 格式链接。",
          color: "#f472b6",
        },
        {
          icon: "🖼",
          title: "图片直接粘贴",
          desc: "截图后直接 ⌘V 粘贴，自动保存为本地文件并插入路径引用，支持拖拽图片文件。",
          color: "#fb923c",
        },
        {
          icon: "🎨",
          title: "完全可定制外观",
          desc: "跟随系统深色/浅色模式，支持自定义各级标题、正文、链接、代码的颜色，偏好面板所见即所得。",
          color: "#a78bfa",
        },
        {
          icon: "💾",
          title: "自动 + 手动双保存",
          desc: "输入后 0.5 秒自动保存，也可随时 ⌘S 手动保存。工具栏绿/红点实时指示保存状态。",
          color: "#4ade80",
        },
        {
          icon: "📌",
          title: "窗口置顶",
          desc: "一键钉住窗口，让备忘录始终浮在最前，对照资料写笔记再也不用来回切换。",
          color: "#fbbf24",
        },
        {
          icon: "📤",
          title: "批量导出",
          desc: "一键将全部备忘录导出为 Markdown 文件，数据完全归你所有，随时迁移无忧。",
          color: "#34d399",
        },
        {
          icon: "✂️",
          title: "视频多段裁剪",
          desc: "VideoClipper：可视化时间轴选区，拖拽创建多个裁剪片段，支持分别保存、拼接合并或两者兼得。",
          color: "#f97316",
        },
        {
          icon: "🎬",
          title: "可视化时间轴",
          desc: "缩略图帧预览 + 刻度标尺，直观展示视频内容，拖拽手柄精确调整区间开始/结束时间。",
          color: "#06b6d4",
        },
        {
          icon: "🔀",
          title: "三种导出模式",
          desc: "灵活选择：将各片段单独保存为独立文件、将所有片段拼接为单一视频，或两者同时导出。",
          color: "#10b981",
        },
      ];

      const shortcuts = [
        { keys: ["⌘", "S"], desc: "手动保存（MemoApp）" },
        { keys: ["⌘", "N"], desc: "新建备忘录（MemoApp）" },
        { keys: ["⌘", "K"], desc: "插入超链接（MemoApp）" },
        { keys: ["⌘", "F"], desc: "全文查找（MemoApp）" },
        { keys: ["⌘", "Z"], desc: "撤销" },
        { keys: ["⇧⌘", "Z"], desc: "重做" },
        { keys: ["⌃⌥", "Z"], desc: "全局唤醒（MemoApp）" },
        { keys: ["⌘", "W"], desc: "关闭窗口" },
        { keys: ["⌘", "O"], desc: "打开视频（VideoClipper）" },
        { keys: ["⌘", "E"], desc: "弹出导出面板（VideoClipper）" },
        { keys: ["A"], desc: "在当前位置添加片段（VideoClipper）" },
        { keys: ["Space"], desc: "播放 / 暂停（VideoClipper）" },
        { keys: ["←", "→"], desc: "逐帧后退 / 前进（VideoClipper）" },
        { keys: ["Delete"], desc: "删除选中片段（VideoClipper）" },
      ];

      const settings = [
        { tab: "通用", items: ["启动时显示", "关闭窗口后保持后台运行", "删除前确认", "字数统计"] },
        { tab: "编辑器", items: ["字体风格与字号", "行间距", "自动换行", "Markdown 高亮", "自动保存延迟"] },
        { tab: "外观", items: ["深色 / 浅色 / 跟随系统", "预览字号", "各级标题颜色", "链接 & 代码颜色"] },
        { tab: "快捷键", items: ["全局快捷键说明", "编辑器快捷键速查"] },
        { tab: "存储", items: ["自定义存储目录", "恢复默认路径", "自动备份"] },
        { tab: "导出", items: ["导出格式选择", "批量导出全部备忘录"] },
        { tab: "VideoClipper", items: ["分别保存各片段为独立文件", "拼接为单一视频保存", "两者都保存", "选择输出目录"] },
      ];

      /* ────────────────────────────────────────────────
         子组件
      ──────────────────────────────────────────────── */

      function Nav() {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const fn = () => setScrolled(window.scrollY > 40);
          window.addEventListener("scroll", fn);
          return () => window.removeEventListener("scroll", fn);
        }, []);

        return (
          <nav style={{
            position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
            padding: "0 40px",
            height: 60,
            display: "flex", alignItems: "center", justifyContent: "space-between",
            background: scrolled ? "rgba(13,13,15,0.85)" : "transparent",
            backdropFilter: scrolled ? "blur(20px)" : "none",
            borderBottom: scrolled ? "1px solid rgba(255,255,255,0.06)" : "none",
            transition: "all 0.3s ease",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: "linear-gradient(135deg, #7c6fff, #a78bfa)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 16, fontWeight: 700,
              }}>M</div>
              <span style={{ fontWeight: 600, fontSize: 16, letterSpacing: "-0.3px" }}>MemoApp</span>
            </div>
            <div style={{ display: "flex", gap: 32, fontSize: 14, color: "var(--text2)" }}>
              {["功能", "快捷键", "偏好设置", "下载"].map(t => (
                <a key={t} href={`#${t}`} style={{
                  color: "inherit", textDecoration: "none",
                  transition: "color 0.2s",
                }}
                onMouseEnter={e => e.target.style.color = "var(--text)"}
                onMouseLeave={e => e.target.style.color = "var(--text2)"}
                >{t}</a>
              ))}
            </div>
            <a href="#下载" style={{
              padding: "8px 20px", borderRadius: 8,
              background: "var(--accent)", color: "#fff",
              fontSize: 14, fontWeight: 500, textDecoration: "none",
              transition: "opacity 0.2s",
            }}
            onMouseEnter={e => e.target.style.opacity = "0.85"}
            onMouseLeave={e => e.target.style.opacity = "1"}
            >免费下载</a>
          </nav>
        );
      }

      function Hero() {
        return (
          <section style={{
            minHeight: "100vh",
            display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            padding: "120px 24px 80px",
            textAlign: "center",
            position: "relative",
            overflow: "hidden",
          }}>
            {/* 背景光晕 */}
            <div style={{
              position: "absolute", top: "20%", left: "50%",
              transform: "translateX(-50%)",
              width: 600, height: 400,
              background: "radial-gradient(ellipse, rgba(124,111,255,0.18) 0%, transparent 70%)",
              pointerEvents: "none",
            }} />

            <div style={{
              display: "inline-flex", alignItems: "center", gap: 8,
              padding: "6px 14px", borderRadius: 100,
              background: "rgba(124,111,255,0.1)",
              border: "1px solid rgba(124,111,255,0.25)",
              fontSize: 13, color: "var(--accent2)",
              marginBottom: 32, fontWeight: 500,
            }}>
              <span style={{
                width: 7, height: 7, borderRadius: "50%",
                background: "var(--green)", display: "inline-block",
                boxShadow: "0 0 8px var(--green)",
              }} />
              专为 macOS 打造的极简备忘录
            </div>

            <h1 style={{
              fontSize: "clamp(42px, 7vw, 80px)",
              fontWeight: 700,
              lineHeight: 1.1,
              letterSpacing: "-2px",
              marginBottom: 24,
              maxWidth: 800,
            }}>
              思维流动时，<br />
              <span style={{
                background: "linear-gradient(135deg, #7c6fff 0%, #a78bfa 50%, #f472b6 100%)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
              }}>不被打断</span>
            </h1>

            <p style={{
              fontSize: "clamp(16px, 2vw, 20px)",
              color: "var(--text2)",
              maxWidth: 560,
              marginBottom: 48,
              lineHeight: 1.7,
            }}>
              MemoApp 是一款极简 macOS 备忘录，专注 Markdown 写作体验。
              全局快捷键唤醒、实时预览、截图直接粘贴，让记录回归纯粹。
            </p>

            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", justifyContent: "center" }}>
              <a href="#下载" style={{
                padding: "14px 32px", borderRadius: 12,
                background: "var(--accent)",
                color: "#fff", fontWeight: 600, fontSize: 16,
                textDecoration: "none",
                boxShadow: "0 0 30px rgba(124,111,255,0.4)",
                transition: "transform 0.2s, box-shadow 0.2s",
              }}
              onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 40px rgba(124,111,255,0.5)"; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "0 0 30px rgba(124,111,255,0.4)"; }}
              >
                免费下载 · macOS
              </a>
              <a href="#功能" style={{
                padding: "14px 32px", borderRadius: 12,
                background: "transparent",
                border: "1px solid var(--border)",
                color: "var(--text2)", fontWeight: 500, fontSize: 16,
                textDecoration: "none",
                transition: "border-color 0.2s, color 0.2s",
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"; e.currentTarget.style.color = "var(--text)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--text2)"; }}
              >
                了解功能 ↓
              </a>
            </div>

            {/* 模拟 App 截图 */}
            <MockAppWindow />
          </section>
        );
      }

      function MockAppWindow() {
        const lines = [
          { type: "h1", text: "# 今日待办" },
          { type: "h2", text: "## 工作" },
          { type: "item", text: "- [x] 完成 MemoApp 官网设计" },
          { type: "item", text: "- [ ] Review PR #42" },
          { type: "item", text: "- [ ] 更新技术方案文档" },
          { type: "h2", text: "## 灵感" },
          { type: "code", text: "```swift" },
          { type: "code", text: "let memo = Memo()" },
          { type: "code", text: "```" },
          { type: "text", text: "截图直接粘贴，自动保存到本地。" },
        ];

        return (
          <div style={{
            marginTop: 80,
            width: "min(900px, 90vw)",
            background: "var(--surface)",
            borderRadius: 16,
            border: "1px solid var(--border)",
            overflow: "hidden",
            boxShadow: "0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05)",
          }}>
            {/* 窗口标题栏 */}
            <div style={{
              height: 44,
              background: "rgba(255,255,255,0.03)",
              borderBottom: "1px solid var(--border)",
              display: "flex", alignItems: "center",
              padding: "0 16px", gap: 8,
            }}>
              {["#ff5f57","#ffbd2e","#28c840"].map(c => (
                <div key={c} style={{ width: 12, height: 12, borderRadius: "50%", background: c }} />
              ))}
              <div style={{
                flex: 1, textAlign: "center",
                fontSize: 13, color: "var(--text3)", letterSpacing: "0.3px",
              }}>备忘录</div>
              <div style={{
                fontSize: 11, color: "var(--green)",
                display: "flex", alignItems: "center", gap: 5,
              }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--green)" }} />
                已保存
              </div>
            </div>
            {/* 内容区 */}
            <div style={{ display: "flex", height: 320 }}>
              {/* 侧边栏 */}
              <div style={{
                width: 180, borderRight: "1px solid var(--border)",
                padding: "12px 0", flexShrink: 0,
              }}>
                {["今日待办", "学习笔记", "项目规划", "读书摘录", "灵感收集"].map((t, i) => (
                  <div key={t} style={{
                    padding: "8px 16px", fontSize: 13,
                    color: i === 0 ? "var(--text)" : "var(--text3)",
                    background: i === 0 ? "rgba(124,111,255,0.12)" : "transparent",
                    borderLeft: i === 0 ? "2px solid var(--accent)" : "2px solid transparent",
                    cursor: "default",
                  }}>{t}</div>
                ))}
              </div>
              {/* 编辑区 */}
              <div style={{
                flex: 1, padding: "20px 24px", fontFamily: "'JetBrains Mono', monospace",
                fontSize: 13, lineHeight: 1.8, overflow: "hidden", borderRight: "1px solid var(--border)",
              }}>
                {lines.map((l, i) => (
                  <div key={i} style={{
                    color: l.type === "h1" ? "#a78bfa"
                         : l.type === "h2" ? "#7c6fff"
                         : l.type === "code" ? "#4ade80"
                         : l.type === "item" ? "var(--text2)"
                         : "var(--text3)",
                    fontSize: l.type === "h1" ? 15 : 13,
                    fontWeight: l.type.startsWith("h") ? 600 : 400,
                  }}>{l.text}</div>
                ))}
                <div style={{
                  display: "inline-block", width: 2, height: 16,
                  background: "var(--accent)", verticalAlign: "middle",
                  animation: "blink 1s step-end infinite",
                }} />
              </div>
              {/* 预览区 */}
              <div style={{
                flex: 1, padding: "20px 24px", fontSize: 13, lineHeight: 1.8,
                overflow: "hidden",
              }}>
                <div style={{ fontSize: 20, fontWeight: 700, color: "var(--text)", marginBottom: 8 }}>今日待办</div>
                <div style={{ fontSize: 15, fontWeight: 600, color: "#7c6fff", marginBottom: 6 }}>工作</div>
                {["✅ 完成 MemoApp 官网设计", "☐ Review PR #42", "☐ 更新技术方案文档"].map(t => (
                  <div key={t} style={{ color: "var(--text2)", marginLeft: 8, fontSize: 13 }}>{t}</div>
                ))}
                <div style={{ fontSize: 15, fontWeight: 600, color: "#7c6fff", margin: "10px 0 6px" }}>灵感</div>
                <div style={{
                  background: "rgba(74,222,128,0.08)", border: "1px solid rgba(74,222,128,0.15)",
                  borderRadius: 6, padding: "6px 12px",
                  fontFamily: "monospace", fontSize: 12, color: "#4ade80",
                }}>let memo = Memo()</div>
                <div style={{ color: "var(--text3)", marginTop: 10, fontSize: 13 }}>截图直接粘贴，自动保存到本地。</div>
              </div>
            </div>
          </div>
        );
      }

      function FeatureCard({ feature, index }) {
        const [hovered, setHovered] = useState(false);
        return (
          <div
            onMouseEnter={() => setHovered(true)}
            onMouseLeave={() => setHovered(false)}
            style={{
              background: hovered ? "var(--surface2)" : "var(--surface)",
              border: `1px solid ${hovered ? "rgba(255,255,255,0.12)" : "var(--border)"}`,
              borderRadius: 16,
              padding: "28px 28px",
              transition: "all 0.25s ease",
              transform: hovered ? "translateY(-4px)" : "none",
              cursor: "default",
            }}>
            <div style={{
              width: 44, height: 44, borderRadius: 10,
              background: `${feature.color}18`,
              border: `1px solid ${feature.color}30`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 20, marginBottom: 16,
            }}>{feature.icon}</div>
            <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 8, letterSpacing: "-0.3px" }}>
              {feature.title}
            </h3>
            <p style={{ fontSize: 14, color: "var(--text2)", lineHeight: 1.7 }}>
              {feature.desc}
            </p>
          </div>
        );
      }

      function Features() {
        return (
          <section id="功能" style={{ padding: "100px 24px" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto" }}>
              <SectionHeader
                tag="核心功能"
                title="专为 macOS 深度优化"
                desc="每一个细节都经过打磨，让记录变成享受。"
              />
              <div style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))",
                gap: 20,
                marginTop: 60,
              }}>
                {features.map((f, i) => <FeatureCard key={f.title} feature={f} index={i} />)}
              </div>
            </div>
          </section>
        );
      }

      function Shortcuts() {
        return (
          <section id="快捷键" style={{ padding: "100px 24px" }}>
            <div style={{ maxWidth: 760, margin: "0 auto" }}>
              <SectionHeader
                tag="快捷键"
                title="指尖上的效率"
                desc="记住这几个快捷键，键盘从不离手。"
              />
              <div style={{
                marginTop: 60,
                background: "var(--surface)",
                border: "1px solid var(--border)",
                borderRadius: 16,
                overflow: "hidden",
              }}>
                {shortcuts.map((s, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "16px 28px",
                    borderBottom: i < shortcuts.length - 1 ? "1px solid var(--border)" : "none",
                  }}>
                    <span style={{ fontSize: 14, color: "var(--text2)" }}>{s.desc}</span>
                    <div style={{ display: "flex", gap: 4 }}>
                      {s.keys.map(k => (
                        <kbd key={k} style={{
                          display: "inline-flex", alignItems: "center", justifyContent: "center",
                          padding: "3px 10px", borderRadius: 6,
                          background: "var(--surface2)",
                          border: "1px solid rgba(255,255,255,0.1)",
                          fontFamily: "'JetBrains Mono', monospace",
                          fontSize: 13, color: "var(--text)",
                          boxShadow: "0 2px 0 rgba(0,0,0,0.4)",
                        }}>{k}</kbd>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function SettingsSection() {
        const [active, setActive] = useState(0);
        return (
          <section id="偏好设置" style={{ padding: "100px 24px" }}>
            <div style={{ maxWidth: 900, margin: "0 auto" }}>
              <SectionHeader
                tag="偏好设置"
                title="每一项都可定制"
                desc="6 个设置面板，覆盖外观、编辑器、存储、导出等全部偏好。"
              />
              <div style={{
                marginTop: 60,
                background: "var(--surface)",
                border: "1px solid var(--border)",
                borderRadius: 16,
                overflow: "hidden",
                display: "flex",
              }}>
                {/* Tab 侧边 */}
                <div style={{
                  width: 140, borderRight: "1px solid var(--border)",
                  padding: "16px 0", flexShrink: 0,
                }}>
                  {settings.map((s, i) => (
                    <button
                      key={s.tab}
                      onClick={() => setActive(i)}
                      style={{
                        display: "block", width: "100%", textAlign: "left",
                        padding: "10px 20px", fontSize: 14, fontFamily: "Inter",
                        background: active === i ? "rgba(124,111,255,0.12)" : "transparent",
                        color: active === i ? "var(--accent2)" : "var(--text3)",
                        border: "none", borderLeft: `2px solid ${active === i ? "var(--accent)" : "transparent"}`,
                        cursor: "pointer", transition: "all 0.15s",

                      }}>
                      {s.tab}
                    </button>
                  ))}
                </div>
                {/* 内容 */}
                <div style={{ flex: 1, padding: "28px 32px" }}>
                  <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 20 }}>
                    {settings[active].tab}

                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {settings[active].items.map(item => (
                      <div key={item} style={{
                        display: "flex", alignItems: "center", gap: 12,
                        padding: "10px 14px",
                        background: "var(--surface2)",
                        borderRadius: 8,
                        fontSize: 14, color: "var(--text2)",

                        }} />

                      </div>

                </div>
              </div>
            </div>
          </section>
        );
